<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRI SENSE - PROVENFRAY</title>
    <style>
        :root { --primary: #ffd700; --bg: #1a1a1a; --card: #262626; --text: #eee; }
        
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; background-color: var(--bg); display: flex; flex-direction: column; height: 100vh; color: #fff; overflow: hidden; }
        
        /* CABECERA */
        .header { background: #000; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .header h1 { margin: 0; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        
        /* BOTÓN GHOST */
        .btn-torneos { border: 2px solid var(--primary); color: var(--primary); padding: 6px 14px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; transition: 0.3s; }
        .btn-torneos:hover { background: var(--primary); color: #000; }

        /* CONTENEDOR CHAT */
        #chat-container { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 10px auto; width: 95%; background: var(--card); border-radius: 15px; overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #1f1f1f; }
        
        /* MENSAJES E INTERLINEADO COMPACTO */
        .avatar { width: 32px; height: 32px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .msg-wrapper { display: flex; align-items: flex-start; max-width: 88%; gap: 10px; }
        .msg-wrapper.user-wrapper { align-self: flex-end; flex-direction: row-reverse; }

        .msg { padding: 12px 18px; border-radius: 15px; font-size: 0.92rem; line-height: 1.25; white-space: pre-wrap; }
        .bot { background: #333; color: var(--text); border-top-left-radius: 2px; }
        
        /* Títulos de sección compactos */
        .bot b { color: var(--primary); display: inline-block; margin-top: 6px; margin-bottom: 2px; font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid var(--primary); }
        .user { background: var(--primary); color: #000; border-top-right-radius: 2px; font-weight: 600; }

        /* INPUT AREA */
        .input-area { padding: 15px 20px; background: var(--card); display: flex; gap: 10px; border-top: 1px solid #333; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px 20px; border: 1px solid #444; border-radius: 30px; outline: none; background: #1a1a1a; color: white; font-size: 0.95rem; }
        .btn-action { background: var(--primary); color: #000; border: none; height: 44px; border-radius: 30px; cursor: pointer; font-weight: 800; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-send { padding: 0 25px; font-size: 0.85rem; }
        .btn-file { width: 44px; font-size: 1.1rem; background: #444; color: #fff; }
        .btn-file.active { background: #4caf50; }

        /* SVG DEL VOLANTE */
        .shuttle-svg { width: 28px; height: 28px; fill: var(--primary); }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
