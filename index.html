<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Bádminton Provenfray Canforrales</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .loading-screen { text-align: center; color: #28a745; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #28a745; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Estilos del Chat Flotante */
        .chat-toggle { position: fixed; bottom: 25px; right: 25px; background: #28a745; color: white; width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 1000; }
        #chat-window { position: fixed; bottom: 100px; right: 25px; width: 320px; height: 400px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 1000; border: 1px solid #eee; }
        .chat-header { background: #28a745; color: white; padding: 12px; font-weight: bold; display: flex; justify-content: space-between; border-radius: 15px 15px 0 0; }
        #chat-content { flex: 1; padding: 15px; overflow-y: auto; background: #fafafa; display: flex; flex-direction: column; gap: 8px; text-align: left; font-size: 14px; }
        .input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 85%; }
        .bot { background: #e9f5ff; align-self: flex-start; }
        .user { background: #28a745; color: white; align-self: flex-end; }
    </style>
</head>
<body>

    <div class="loading-screen" id="loader">
        <h1>🏸 Abriendo Gestión de Torneos...</h1>
        <div class="spinner"></div>
        <p>Si no redirige automáticamente, <a href="https://ais-pre-xchgvzau5r7yabzznk57xq-422275897046.europe-west2.run.app/">haz clic aquí</a>.</p>
    </div>

    <button class="chat-toggle" onclick="toggleChat()">🤖</button>

    <div id="chat-window">
        <div class="chat-header">
            <span>Entrenador IA</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer;">×</button>
        </div>
        <div id="chat-content">
            <div class="msg bot">¡Hola! Estoy aquí para ayudarte con tus dudas de bádminton.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Pregunta algo...">
            <button onclick="enviar()" style="background:none; border:none; color:#28a745; font-weight:bold; cursor:pointer;">Ir</button>
        </div>
    </div>

    <script>
        // REDIRECCIÓN DIRECTA AL CARGAR
        window.onload = () => {
            setTimeout(() => {
                window.location.href = "https://ais-pre-xchgvzau5r7yabzznk57xq-422275897046.europe-west2.run.app/";
            }, 1500); // 1.5 segundos de cortesía para que vean el logo
        };

        function toggleChat() {
            const chat = document.getElementById('chat-window');
            chat.style.display = (chat.style.display === 'flex') ? 'none' : 'flex';
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const content = document.getElementById('chat-content');
            if (!input.value.trim()) return;

            const text = input.value;
            content.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            content.scrollTop = content.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await res.json();
                content.innerHTML += `<div class="msg bot">${data.text}</div>`;
            } catch (e) {
                content.innerHTML += `<div class="msg bot" style="color:red;">Error de conexión.</div>`;
            }
            content.scrollTop = content.scrollHeight;
        }
    </script>
</body>
</html>
