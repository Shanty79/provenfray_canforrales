<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRI SENSE - PROVENFRAY</title>
    <style>
        :root { 
            --primary: #ffd700; 
            --bg: #0d0d0d; 
            --card: #1a1a1a; 
            --text: #ffffff; 
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            color: var(--text); 
            overflow: hidden; 
        }
        
        /* CABECERA */
        .header { 
            background: #000; 
            padding: 15px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 4px 15px rgba(255,215,0,0.2);
        }
        .header h1 { 
            margin: 0; 
            font-size: 1.2rem; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: var(--primary); 
            text-transform: uppercase; 
            font-weight: 900;
        }

        /* ICONO VOLANTE FUTURISTA */
        .shuttle-svg { 
            width: 30px; 
            height: 30px; 
            fill: var(--primary); 
            filter: drop-shadow(0 0 5px var(--primary)); 
        }

        /* BOTÓN TORNEOS (RESTABLECIDO) */
        .btn-torneos { 
            background: var(--primary);
            color: #000;
            padding: 8px 16px; 
            border-radius: 6px; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 0.75rem; 
            text-transform: uppercase;
            transition: transform 0.2s ease;
        }
        .btn-torneos:hover { transform: scale(1.05); opacity: 0.9; }

        /* CONTENEDOR CHAT */
        #chat-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            max-width: 900px; 
            margin: 15px auto; 
            width: 95%; 
            background: var(--card); 
            border-radius: 15px; 
            border: 1px solid #333;
            overflow: hidden; 
        }

        #chat-box { 
            flex: 1; 
            padding: 25px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%); 
        }
        
        /* MENSAJES CON INTERLINEADO 1.5 */
        .avatar { width: 35px; height: 35px; flex-shrink: 0; }
        .msg-wrapper { display: flex; align-items: flex-start; max-width: 90%; gap: 15px; }
        .msg-wrapper.user-wrapper { align-self: flex-end; flex-direction: row-reverse; }

        .msg { 
            padding: 15px 20px; 
            border-radius: 15px; 
            font-size: 1rem; 
            line-height: 1.5; /* INTERLINEADO 1.5 SOLICITADO */
            white-space: pre-wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        
        .bot { 
            background: #262626; 
            color: #efefef; 
            border-left: 4px solid var(--primary);
        }
        
        .bot b { 
            color: var(--primary); 
            display: block; 
            margin-bottom: 10px;
            font-size: 0.85rem; 
            text-transform: uppercase; 
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 4px;
        }

        .user { 
            background: var(--primary); 
            color: #000; 
            font-weight: 700;
        }

        /* INPUT AREA */
        .input-area { 
            padding: 20px; 
            background: #000; 
            display: flex; 
            gap: 12px; 
            align-items: center;
        }
        input[type="text"] { 
            flex: 1; 
            padding: 14px 22px; 
            border: 1px solid #333; 
            border-radius: 10px; 
            background: #111; 
            color: white; 
            font-size: 1rem; 
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        .btn-action { 
            background: var(--primary); 
            color: #000; 
            border: none; 
            height: 50px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 900;
            padding: 0 25px;
            text-transform: uppercase;
        }
        .btn-file { background: #333; color: #fff; width: 50px; padding: 0; font-size: 1.4rem; }

        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>
            <svg class="shuttle-svg" viewBox="0 0 24 24">
                <path d="M12 2L9 7h6l-3-5z M8 8h8l-1 7h-6l-1-7z M12 22a4 4 0 0 0 4-4H8a4 4 0 0 0 4 4z"/>
            </svg>
            Airi Sense · ProvenFray
        </h1>
        <a href="https://ais-pre-xchgvzau5r7yabzznk57xq-422275897046.europe-west2.run.app/" target="_blank" class="btn-torneos">TORNEOS</a>
    </div>

    <div id="chat-container">
        <div id="chat-box">
            <div class="msg-wrapper">
                <div class="avatar">
                    <svg class="shuttle-svg" style="width:26px; height:26px;" viewBox="0 0 24 24">
                        <path d="M12 2L9 7h6l-3-5z M8 8h8l-1 7h-6l-1-7z M12 22a4 4 0 0 0 4-4H8a4 4 0 0 0 4 4z"/>
                    </svg>
                </div>
                <div class="msg bot">
<b>Airi Sense · ProvenFray</b>
¡Hola!

Soy tu zona de entrenamiento inteligente.

Estoy lista para analizar:
🔹 tu técnica,
🔹 tu táctica,
🔹 y tus fotos.

¿En qué vamos a trabajar hoy?
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="updateFileStatus()">
            <button class="btn-action btn-file" id="fileBtn" onclick="document.getElementById('imageInput').click()">📎</button>
            <input type="text" id="userInput" placeholder="Pregunta algo sobre tu bádminton...">
            <button class="btn-action" onclick="enviar()">ENVIAR</button>
        </div>
    </div>

    <script>
        function updateFileStatus() {
            const input = document.getElementById('imageInput');
            const btn = document.getElementById('fileBtn');
            btn.innerHTML = input.files.length > 0 ? '✔' : '📎';
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const fileInput = document.getElementById('imageInput');
            const box = document.getElementById('chat-box');
            if(!input.value.trim() && fileInput.files.length === 0) return;

            const text = input.value;
            let imageBase64 = null;

            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                imageBase64 = await new Promise(r => {
                    reader.onload = () => r(reader.result);
                    reader.readAsDataURL(fileInput.files[0]);
                });
            }

            box.innerHTML += `<div class="msg-wrapper user-wrapper"><div class="msg user">${text}</div></div>`;
            input.value = ''; fileInput.value = ''; updateFileStatus();
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text || "Analiza esta imagen", image: imageBase64 })
                });
                const data = await res.json();
                box.innerHTML += `
                    <div class="msg-wrapper">
                        <div class="avatar">
                            <svg class="shuttle-svg" style="width:24px; height:24px;" viewBox="0 0 24 24">
                                <path d="M12 2L9 7h6l-3-5z M8 8h8l-1 7h-6l-1-7z M12 22a4 4 0 0 0 4-4H8a4 4 0 0 0 4 4z"/>
                            </svg>
                        </div>
                        <div class="msg bot"><b>Airi Sense · ProvenFray</b>${data.text}</div>
                    </div>`;
            } catch (e) {
                box.innerHTML += `<div class="msg bot" style="color:#ff6b6b;">Error de conexión.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>
