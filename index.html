<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club de Bádminton Canforrales</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f7f6; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #28a745; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .btn-gestion { background: #007bff; color: white; padding: 15px 30px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 18px; margin-bottom: 30px; transition: background 0.3s; }
        .btn-gestion:hover { background: #0056b3; }
        .chat-container { width: 100%; max-width: 600px; background: white; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 400px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; border-bottom: 1px solid #eee; }
        .input-area { display: flex; padding: 10px; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .btn-send { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .msg-bot { background: #e9f5ff; padding: 8px 12px; border-radius: 10px; margin-bottom: 10px; align-self: flex-start; max-width: 80%; }
        .msg-user { background: #28a745; color: white; padding: 8px 12px; border-radius: 10px; margin-bottom: 10px; align-self: flex-end; max-width: 80%; text-align: right; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Club de Bádminton Canforrales</h1>
    </div>

    <div class="main-content">
        <a href="https://ais-pre-xchgvzau5r7yabzznk57xq-422275897046.europe-west2.run.app/" target="_blank" class="btn-gestion">
            📅 Abrir Gestión de Torneos y Calendario
        </a>

        <div class="chat-container">
            <div id="chat-box" style="display: flex; flex-direction: column;">
                <div class="msg-bot"><b>Asistente:</b> ¡Hola! Ya estoy configurado correctamente. ¿En qué puedo ayudarte con el bádminton hoy?</div>
            </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Pregunta al entrenador...">
                <button class="btn-send" onclick="enviar()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        async function enviar() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if(!input.value.trim()) return;

            const prompt = input.value;
            chatBox.innerHTML += `<div class="msg-user">${prompt}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await response.json();
                chatBox.innerHTML += `<div class="msg-bot"><b>Asistente:</b> ${data.text}</div>`;
            } catch (e) {
                chatBox.innerHTML += `<div style="color:red; text-align:center; font-size:12px;">Error de conexión.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>
