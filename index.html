<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRI SENSE - PROVENFRAY</title>
    <style>
        :root { 
            --primary: #ffd700; 
            --bg: #0d0d0d; 
            --card: #1a1a1a; 
            --text: #ffffff; 
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            color: var(--text); 
            overflow: hidden; 
        }
        
        /* CABECERA CON GLOW */
        .header { 
            background: #000; 
            padding: 12px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 15px rgba(255,215,0,0.15);
        }
        .header h1 { 
            margin: 0; 
            font-size: 1.1rem; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: var(--primary); 
            text-transform: uppercase; 
            font-weight: 900;
            letter-spacing: 1px;
        }

        /* EL VOLANTE DEFINITIVO (SVG Técnico) */
        .shuttle-svg { 
            width: 28px; 
            height: 28px; 
            fill: var(--primary); 
            filter: drop-shadow(0 0 4px rgba(255,215,0,0.4));
        }

        .btn-torneos { 
            border: 1.5px solid var(--primary); 
            color: var(--primary); 
            padding: 6px 12px; 
            border-radius: 4px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 0.7rem; 
            text-transform: uppercase;
        }

        /* CONTENEDOR CHAT */
        #chat-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            max-width: 850px; 
            margin: 15px auto; 
            width: 95%; 
            background: var(--card); 
            border-radius: 12px; 
            border: 1px solid #333;
            overflow: hidden; 
        }

        #chat-box { 
            flex: 1; 
            padding: 25px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            background: #111; 
        }
        
        /* MENSAJES CON INTERLINEADO 1.5 */
        .avatar { width: 32px; height: 32px; flex-shrink: 0; }
        .msg-wrapper { display: flex; align-items: flex-start; max-width: 90%; gap: 15px; }
        .msg-wrapper.user-wrapper { align-self: flex-end; flex-direction: row-reverse; }

        .msg { 
            padding: 15px 20px; 
            border-radius: 12px; 
            font-size: 0.95rem; 
            line-height: 1.5; /* SOLICITADO */
            white-space: pre-wrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .bot { 
            background: #2a2a2a; 
            color: #efefef; 
            border-left: 4px solid var(--primary);
        }
        
        .bot b { 
            color: var(--primary); 
            display: block; 
            margin-bottom: 8px;
            font-size: 0.8rem; 
            text-transform: uppercase; 
        }

        .user { 
            background: var(--primary); 
            color: #000; 
            font-weight: 700;
        }

        /* INPUT AREA */
        .input-area { 
            padding: 15px 20px; 
            background: #000; 
            display: flex; 
            gap: 12px; 
            align-items: center;
        }
        input[type="text"] { 
            flex: 1; 
            padding: 12px 18px; 
            border: 1px solid #333; 
            border-radius: 6px; 
            background: #111; 
            color: white; 
            font-size: 1rem; 
            outline: none;
        }
        .btn-action { 
            background: var(--primary); 
            color: #000; 
            border: none; 
            height: 45px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 900;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>
            <svg class="shuttle-svg" viewBox="0 0 24 24">
                <path d="M12 2L9 7l.3 4H14.7l.3-4-3-5zM7.5 7.5L4 8l5 7h6l5-7-3.5-.5L12 11 7.5 7.5zM9 16a3 3 0 0 0 6 0H9z"/>
            </svg>
            Airi Sense · ProvenFray
        </h1>
        <a href="#" class="btn-torneos">TORNEOS</a>
    </div>

    <div id="chat-container">
        <div id="chat-box">
            <div class="msg-wrapper">
                <div class="avatar">
                    <svg class="shuttle-svg" style="width:24px; height:24px;" viewBox="0 0 24 24">
                        <path d="M12 2L9 7l.3 4H14.7l.3-4-3-5zM7.5 7.5L4 8l5 7h6l5-7-3.5-.5L12 11 7.5 7.5zM9 16a3 3 0 0 0 6 0H9z"/>
                    </svg>
                </div>
                <div class="msg bot">
<b>Airi Sense · ProvenFray</b>
¡Hola!

Soy tu zona de entrenamiento inteligente.

Estoy lista para analizar:
🔹 tu técnica,
🔹 tu táctica,
🔹 y tus fotos.

¿En qué vamos a trabajar hoy?
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="updateFileStatus()">
            <button class="btn-action" style="background:#333; color:white; width:45px; padding:0;" onclick="document.getElementById('imageInput').click()">📎</button>
            <input type="text" id="userInput" placeholder="Escribe aquí...">
            <button class="btn-action" onclick="enviar()">ENVIAR</button>
        </div>
    </div>

    <script>
        function updateFileStatus() {
            const input = document.getElementById('imageInput');
            if (input.files.length > 0) alert("Foto lista para analizar");
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const fileInput = document.getElementById('imageInput');
            const box = document.getElementById('chat-box');
            if(!input.value.trim() && fileInput.files.length === 0) return;

            const text = input.value;
            let imageBase64 = null;

            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                imageBase64 = await new Promise(r => {
                    reader.onload = () => r(reader.result);
                    reader.readAsDataURL(fileInput.files[0]);
                });
            }

            box.innerHTML += `<div class="msg-wrapper user-wrapper"><div class="msg user">${text}</div></div>`;
            input.value = ''; fileInput.value = '';
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text || "Analiza esta imagen", image: imageBase64 })
                });
                const data = await res.json();
                box.innerHTML += `
                    <div class="msg-wrapper">
                        <div class="avatar">
                            <svg class="shuttle-svg" style="width:20px; height:20px; margin-top:8px;" viewBox="0 0 24 24">
                                <path d="M12 2L9 7l.3 4H14.7l.3-4-3-5zM7.5 7.5L4 8l5 7h6l5-7-3.5-.5L12 11 7.5 7.5zM9 16a3 3 0 0 0 6 0H9z"/>
                            </svg>
                        </div>
                        <div class="msg bot">${data.text}</div>
                    </div>`;
            } catch (e) {
                box.innerHTML += `<div class="msg bot" style="color:#ff6b6b;">Error de conexión.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>
