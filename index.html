<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Canforrales + Asistente</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: sans-serif; }
        
        /* Contenedor de la web de eventos */
        .iframe-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Botón del Asistente Flotante */
        .chat-trigger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #28a745;
            color: white;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 30px;
            z-index: 9999; /* Siempre encima de todo */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ventana del Chat */
        .chat-window {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 320px;
            height: 450px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            z-index: 9999;
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .chat-header { background: #28a745; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-content { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        .chat-input { display: flex; padding: 10px; border-top: 1px solid #eee; }
        .chat-input input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        
        .msg { padding: 8px 12px; border-radius: 10px; font-size: 14px; max-width: 85%; }
        .bot { background: #e9f5ff; align-self: flex-start; color: #333; }
        .user { background: #28a745; color: white; align-self: flex-end; }
        
        /* Mensaje de aviso si falla el iframe */
        .fallback-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="iframe-wrapper">
        <iframe src="https://ais-pre-xchgvzau5r7yabzznk57xq-422275897046.europe-west2.run.app/" 
                style="width: 100%; height: 100%; border: none;"></iframe>
    </div>

    <div class="fallback-msg">
        <p>Cargando gestión de torneos...</p>
        <p>Si la página no aparece, es debido a restricciones de seguridad del servidor de eventos.</p>
    </div>

    <button class="chat-trigger" onclick="toggleChat()">🤖</button>

    <div class="chat-window" id="chatWin">
        <div class="chat-header">
            <span>Entrenador IA</span>
            <span style="cursor:pointer" onclick="toggleChat()">×</span>
        </div>
        <div id="chat-content">
            <div class="msg bot">¡Hola! Soy tu asistente. ¿Dudas con el entrenamiento o los torneos?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Escribe aquí...">
            <button onclick="enviar()" style="border:none; background:none; color:#28a745; font-weight:bold; cursor:pointer; margin-left:5px;">Ir</button>
        </div>
    </div>

    <script>
        function toggleChat() {
            const win = document.getElementById('chatWin');
            win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const content = document.getElementById('chat-content');
            if(!input.value.trim()) return;

            const text = input.value;
            content.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            content.scrollTop = content.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await res.json();
                content.innerHTML += `<div class="msg bot">${data.text}</div>`;
            } catch (e) {
                content.innerHTML += `<div class="msg bot" style="color:red;">Error de conexión.</div>`;
            }
            content.scrollTop = content.scrollHeight;
        }
        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>
