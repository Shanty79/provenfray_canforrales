<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProvenFray - Fray-Smash: Asistente IA</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; background-color: #1a1a1a; display: flex; flex-direction: column; height: 100vh; color: #fff; }
        
        /* CABECERA PROVENFRAY */
        .header { 
            background: #000; 
            color: #ffd700; 
            padding: 15px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid #ffd700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .header h1 { margin: 0; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        
        /* BOTÓN TORNEOS */
        .btn-torneos { 
            background: #ffd700; 
            color: #000; 
            padding: 10px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 0.85rem; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-torneos:hover { background: #fff; transform: translateY(-2px); }

        /* CONTENEDOR PRINCIPAL */
        #chat-container { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 20px auto; width: 95%; background: #262626; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        
        /* CAJA DE MENSAJES */
        #chat-box { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #1f1f1f; }
        
        /* ICONO PERSONALIZADO EN LOS MENSAJES */
        .avatar { width: 35px; height: 35px; background: #ffd700; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 10px; flex-shrink: 0; border: 2px solid #000; }

        .msg-wrapper { display: flex; align-items: flex-start; max-width: 85%; }
        .msg-wrapper.user-wrapper { align-self: flex-end; flex-direction: row-reverse; }

        .msg { padding: 12px 18px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; }
        
        /* Estilo Fray-Smash */
        .bot { background: #333; color: #eee; border-top-left-radius: 2px; }
        .bot b { color: #ffd700; display: block; margin-bottom: 4px; font-size: 0.8rem; text-transform: uppercase; }
        
        /* Estilo Usuario */
        .user { background: #ffd700; color: #000; border-top-right-radius: 2px; font-weight: 500; }

        /* INPUT AREA */
        .input-area { padding: 20px; background: #262626; display: flex; gap: 12px; border-top: 1px solid #333; }
        input { flex: 1; padding: 14px 20px; border: 1px solid #444; border-radius: 30px; outline: none; background: #1a1a1a; color: white; font-size: 1rem; }
        input:focus { border-color: #ffd700; }
        
        button { background: #ffd700; color: #000; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #fff; }

        /* Scrollbar personalizada */
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1><span>🏸</span> Fray-Smash: Asistente IA</h1>
        <a href="https://ais-pre-xchgvzau5r7yabzznk57xq-422275897046.europe-west2.run.app/" target="_blank" class="btn-torneos">
            🏆 Gestión de Torneos
        </a>
    </div>

    <div id="chat-container">
        <div id="chat-box">
            <div class="msg-wrapper">
                <div class="avatar">🎾</div>
                <div class="msg bot">
                    <b>Fray-Smash: Asistente IA</b>
                    Bienvenido a la zona de estrategia del Club ProvenFray Canforrales. Soy tu asistente personal de Bádminton. <br>
                    ¿En que te puedo ayudar? <br>
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Pregunta a Fray-Smash...">
            <button onclick="enviar()">Enviar</button>
        </div>
    </div>

    <script>
        async function enviar() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chat-box');
            if(!input.value.trim()) return;

            const text = input.value;
            
            // Mensaje del usuario
            box.innerHTML += `
                <div class="msg-wrapper user-wrapper">
                    <div class="msg user">${text}</div>
                </div>`;
            
            input.value = '';
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await res.json();
                
                // Mensaje de la IA con icono
                box.innerHTML += `
                    <div class="msg-wrapper">
                        <div class="avatar">🎾</div>
                        <div class="msg bot">
                            <b>Fray-Smash: Asistente IA</b>
                            ${data.text}
                        </div>
                    </div>`;
            } catch (e) {
                box.innerHTML += `<div class="msg bot" style="color:#ff6b6b; margin-left:45px;">Error de conexión.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>
