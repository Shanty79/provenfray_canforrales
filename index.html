<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏸 Club Bádminton IA</title>
    <style>
        body { font-family: system-ui; max-width: 500px; margin: 20px auto; background: #f4f4f9; padding: 10px; }
        #chat { height: 400px; border-radius: 8px; background: white; border: 1px solid #ddd; overflow-y: auto; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; }
        .user { background: #007bff; color: white; margin-left: 20%; text-align: right; }
        .bot { background: #e9e9eb; color: #333; margin-right: 20%; }
        input { width: 75%; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { width: 20%; padding: 10px; border-radius: 20px; border: none; background: #28a745; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h2 style="text-align: center;">🏸 Asistente del Club</h2>
    <div id="chat"></div>
    <div style="display: flex; justify-content: space-between;">
        <input type="text" id="input" placeholder="Escribe al entrenador...">
        <button onclick="send()">Enviar</button>
    </div>

    <script>
async function send() {
    const input = document.getElementById('input');
    const chat = document.getElementById('chat');
    if(!input.value) return;

    const userText = input.value;
    chat.innerHTML += `<div class="msg user">${userText}</div>`;
    input.value = '';
    chat.scrollTop = chat.scrollHeight;

    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: userText })
        });
        const data = await response.json();
        // Verificamos que 'text' exista antes de mostrarlo
        const botText = data.text || "La IA no ha podido generar una respuesta ahora mismo.";
        chat.innerHTML += `<div class="msg bot">${botText}</div>`;
    } catch (e) {
        chat.innerHTML += `<div class="msg bot" style="color:red;">Error de conexión.</div>`;
    }
    chat.scrollTop = chat.scrollHeight;
}
    </script>
</body>
</html>
