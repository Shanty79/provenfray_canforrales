<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Canforrales - Gestión de Torneos</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* La gestión de torneos ocupa TODA la pantalla */
        .iframe-container { width: 100%; height: 100vh; border: none; }

        /* Botón flotante para abrir el chat */
        .chat-launcher {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        /* Ventana del chat (oculta por defecto) */
        .chat-window {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 350px;
            height: 450px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none; /* Se activa con JS */
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
        }

        .chat-header { background: #28a745; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; }
        .input-area { display: flex; padding: 10px; border-top: 1px solid #eee; gap: 5px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .btn-send { background: #28a745; border: none; color: white; padding: 10px; border-radius: 5px; cursor: pointer; }
        .msg { padding: 8px 12px; border-radius: 10px; font-size: 14px; max-width: 85%; }
        .bot { background: #e9f5ff; align-self: flex-start; }
        .user { background: #28a745; color: white; align-self: flex-end; }
    </style>
</head>
<body>

    <iframe class="iframe-container" src="https://ais-pre-xchgvzau5r7yabzznk57xq-422275897046.europe-west2.run.app/"></iframe>

    <div class="chat-launcher" onclick="toggleChat()">🏸</div>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <span>Asistente del Club</span>
            <span style="cursor:pointer" onclick="toggleChat()">✖</span>
        </div>
        <div id="chat-box">
            <div class="msg bot">¡Hola! Soy tu asistente. ¿En qué puedo ayudarte?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Pregunta algo...">
            <button class="btn-send" onclick="enviar()">Enviar</button>
        </div>
    </div>

    <script>
        function toggleChat() {
            const win = document.getElementById('chatWindow');
            win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chat-box');
            if(!input.value.trim()) return;

            const prompt = input.value;
            box.innerHTML += `<div class="msg user">${prompt}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            try {
                // He cambiado la lógica interna para que use /api/chat que ya tienes
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await response.json();
                box.innerHTML += `<div class="msg bot"><b>Asistente:</b> ${data.text}</div>`;
            } catch (e) {
                box.innerHTML += `<div style="color:red; font-size:12px; text-align:center;">Error de conexión.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>
