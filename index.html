<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRI SENSE - PROVENFRAY</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; background-color: #1a1a1a; display: flex; flex-direction: column; height: 100vh; color: #fff; }
        
        /* CABECERA PROVENFRAY */
        .header { 
            background: #000; 
            color: #ffd700; 
            padding: 15px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid #ffd700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .header h1 { margin: 0; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        
        /* BOTÓN TORNEOS */
        .btn-torneos { 
            background: #ffd700; 
            color: #000; 
            padding: 10px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 0.85rem; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-torneos:hover { background: #fff; transform: translateY(-2px); }

        /* CONTENEDOR PRINCIPAL */
        #chat-container { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 20px auto; width: 95%; background: #262626; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        
        /* CAJA DE MENSAJES */
        #chat-box { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #1f1f1f; }
        
        /* ICONOS Y BURBUJAS */
        .avatar { width: 35px; height: 35px; background: #ffd700; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 10px; flex-shrink: 0; border: 2px solid #000; }
        .msg-wrapper { display: flex; align-items: flex-start; max-width: 85%; }
        .msg-wrapper.user-wrapper { align-self: flex-end; flex-direction: row-reverse; }
        .msg { padding: 12px 18px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; white-space: pre-wrap; } /* pre-wrap para respetar saltos de línea */
        
        .bot { background: #333; color: #eee; border-top-left-radius: 2px; }
        .bot b { color: #ffd700; display: block; margin-bottom: 4px; font-size: 0.8rem; text-transform: uppercase; }
        .user { background: #ffd700; color: #000; border-top-right-radius: 2px; font-weight: 500; }

        /* INPUT AREA */
        .input-area { padding: 20px; background: #262626; display: flex; gap: 10px; border-top: 1px solid #333; align-items: center; }
        input[type="text"] { flex: 1; padding: 14px 20px; border: 1px solid #444; border-radius: 30px; outline: none; background: #1a1a1a; color: white; font-size: 1rem; }
        input:focus { border-color: #ffd700; }
        
        /* BOTONES */
        .btn-action { background: #ffd700; color: #000; border: none; height: 45px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-send { padding: 0 25px; }
        .btn-file { width: 45px; font-size: 1.2rem; background: #444; color: #fff; }
        .btn-file.active { background: #ffd700; color: #000; }
        .btn-action:hover { background: #fff; color: #000; }

        /* Scrollbar personalizada */
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1><span>🏸</span> Airi Sense · ProvenFray</h1>
        <a href="https://ais-pre-xchgvzau5r7yabzznk57xq-422275897046.europe-west2.run.app/" target="_blank" class="btn-torneos">
            🏆 Gestión de Torneos
        </a>
    </div>

    <div id="chat-container">
        <div id="chat-box">
            <div class="msg-wrapper">
                <div class="avatar">🎾</div>
                <div class="msg bot">
                    <b>Airi Sense · ProvenFray</b>
                    ¡Hola! Soy tu zona de entrenamiento inteligente. <br>
                    Estoy lista para analizar tu técnica, táctica e incluso tus fotos. <br><br>
                    ¿Qué vamos a entrenar hoy? 🏸
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="updateFileStatus()">
            <button class="btn-action btn-file" id="fileBtn" onclick="document.getElementById('imageInput').click()" title="Adjuntar foto">📎</button>
            
            <input type="text" id="userInput" placeholder="Pregunta o envía una foto...">
            <button class="btn-action btn-send" onclick="enviar()">Enviar</button>
        </div>
    </div>

    <script>
        // Función para saber si hay una imagen cargada y cambiar el color del botón
        function updateFileStatus() {
            const input = document.getElementById('imageInput');
            const btn = document.getElementById('fileBtn');
            if (input.files.length > 0) {
                btn.classList.add('active');
                btn.innerHTML = '✅';
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '📎';
            }
        }

        // Función para convertir imagen a Base64
        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const fileInput = document.getElementById('imageInput');
            const box = document.getElementById('chat-box');
            
            if(!input.value.trim() && fileInput.files.length === 0) return;

            const text = input.value;
            let imageBase64 = null;

            // Si hay imagen, la convertimos
            if (fileInput.files.length > 0) {
                imageBase64 = await toBase64(fileInput.files[0]);
            }

            // Mostrar mensaje del usuario
            box.innerHTML += `
                <div class="msg-wrapper user-wrapper">
                    <div class="msg user">${text} ${imageBase64 ? '<br><i>(Imagen enviada 📸)</i>' : ''}</div>
                </div>`;
            
            // Limpiar inputs
            input.value = '';
            fileInput.value = '';
            updateFileStatus();
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: text || "Analiza esta imagen", 
                        image: imageBase64 
                    })
                });
                const data = await res.json();
                
                box.innerHTML += `
                    <div class="msg-wrapper">
                        <div class="avatar">🎾</div>
                        <div class="msg bot">
                            <b>Airi Sense · ProvenFray</b>
                            ${data.text}
                        </div>
                    </div>`;
            } catch (e) {
                box.innerHTML += `<div class="msg bot" style="color:#ff6b6b; margin-left:45px;">Airi está ajustando su raqueta... Error de conexión.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>
