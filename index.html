<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club de Bádminton Canforrales</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        .top-bar { background: #28a745; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .main-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .btn-principal { background: #007bff; color: white; padding: 20px 40px; text-decoration: none; border-radius: 12px; font-size: 20px; font-weight: bold; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        /* Chat Flotante */
        #chat-widget { position: fixed; bottom: 20px; right: 20px; width: 350px; height: 450px; background: white; border-radius: 15px; display: none; flex-direction: column; box-shadow: 0 5px 25px rgba(0,0,0,0.2); z-index: 1000; overflow: hidden; }
        .chat-header { background: #28a745; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-content { flex: 1; padding: 15px; overflow-y: auto; background: #f8f9fa; display: flex; flex-direction: column; gap: 10px; }
        .input-box { display: flex; padding: 10px; border-top: 1px solid #eee; }
        .input-box input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .launch-btn { position: fixed; bottom: 20px; right: 20px; background: #28a745; color: white; width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .msg { padding: 8px 12px; border-radius: 10px; font-size: 14px; max-width: 80%; }
        .bot { background: #e9ecef; align-self: flex-start; }
        .user { background: #28a745; color: white; align-self: flex-end; }
    </style>
</head>
<body>

    <div class="top-bar">CANFORRALES - ÁREA DE GESTIÓN</div>

    <div class="main-view">
        <a href="https://ais-pre-xchgvzau5r7yabzznk57xq-422275897046.europe-west2.run.app/" target="_self" class="btn-principal">
            🏆 ENTRAR A GESTIÓN DE TORNEOS
        </a>
        <p style="color: #666;">Haz clic arriba para gestionar el calendario y rankings</p>
    </div>

    <button class="launch-btn" id="openBtn" onclick="toggleChat()">🏸</button>

    <div id="chat-widget">
        <div class="chat-header">
            <span>Entrenador IA</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
        </div>
        <div id="chat-content">
            <div class="msg bot">¡Hola! Soy tu asistente. Pulsa el botón azul para los torneos o pregúntame dudas aquí.</div>
        </div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Pregunta algo...">
            <button onclick="enviar()" style="background:none; border:none; color:#28a745; font-weight:bold; cursor:pointer; margin-left:5px;">Ir</button>
        </div>
    </div>

    <script>
        function toggleChat() {
            const chat = document.getElementById('chat-widget');
            const btn = document.getElementById('openBtn');
            const isVisible = chat.style.display === 'flex';
            chat.style.display = isVisible ? 'none' : 'flex';
            btn.style.display = isVisible ? 'flex' : 'none';
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const content = document.getElementById('chat-content');
            if (!input.value.trim()) return;

            const text = input.value;
            content.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            content.scrollTop = content.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await res.json();
                content.innerHTML += `<div class="msg bot"><b>Asistente:</b> ${data.text}</div>`;
            } catch (e) {
                content.innerHTML += `<div class="msg bot" style="color:red;">Error de conexión.</div>`;
            }
            content.scrollTop = content.scrollHeight;
        }
    </script>
</body>
</html>
