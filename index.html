<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargando Proyecto IA...</title>
    <script>
        // Cambia la dirección de la ventana principal para evitar el bloqueo del iFrame
        window.location.replace("https://ais-pre-xchgvzau5r7yabzznk57xq-422275897046.europe-west2.run.app/");
    </script>
</head>
<body style="background-color: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div style="text-align: center;">
        <p>Redirigiendo a la aplicación de IA...</p>
        <small>Si no carga, <a href="https://ais-pre-xchgvzau5r7yabzznk57xq-422275897046.europe-west2.run.app/">haz clic aquí</a>.</small>
    </div>
    <hr>
<div id="asistente-section" style="padding: 20px; max-width: 600px; margin: auto;">
    <h3>🏸 Asistente del Club</h3>
    <div id="chat" style="height: 300px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; border-radius: 8px;"></div>
    <div style="display: flex; gap: 10px;">
        <input type="text" id="input" placeholder="Pregunta al entrenador..." style="flex-grow: 1; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
        <button onclick="send()" style="padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">Enviar</button>
    </div>
</div>

<script>
async function send() {
    const input = document.getElementById('input');
    const chat = document.getElementById('chat');
    if(!input.value) return;

    const userText = input.value;
    chat.innerHTML += `<div style="margin-bottom:10px;"><b>Tú:</b> ${userText}</div>`;
    input.value = '';
    
    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: userText })
        });
        const data = await response.json();
        chat.innerHTML += `<div style="margin-bottom:10px; color: #333; background: #eef; padding: 5px; border-radius: 5px;"><b>Bot:</b> ${data.text}</div>`;
    } catch (e) {
        chat.innerHTML += `<div style="color:red;">Error de conexión.</div>`;
    }
    chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
