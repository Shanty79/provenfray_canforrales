<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRI SENSE - PROVENFRAY</title>
    <style>
        :root { --primary: #ffd700; --bg: #0a0a0a; --card: #1a1a1a; --text: #ffffff; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--bg); display: flex; flex-direction: column; height: 100vh; color: var(--text); overflow: hidden; }
        
        /* CABECERA */
        .header { background: #000; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .header h1 { margin: 0; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; color: var(--primary); text-transform: uppercase; font-weight: 800; }
        
        /* ICONO VOLANTE (Simplificado para que no falle) */
        .shuttle-icon { width: 28px; height: 28px; background: var(--primary); clip-path: polygon(20% 0%, 80% 0%, 100% 80%, 50% 100%, 0% 80%); box-shadow: 0 0 10px var(--primary); }

        .btn-torneos { border: 1px solid var(--primary); color: var(--primary); padding: 5px 12px; border-radius: 4px; text-decoration: none; font-weight: 700; font-size: 0.7rem; }

        /* CHAT */
        #chat-container { flex: 1; display: flex; flex-direction: column; max-width: 800px; margin: 10px auto; width: 95%; background: var(--card); border-radius: 10px; overflow: hidden; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #121212; }
        
        /* MENSAJES CON INTERLINEADO 1.5 */
        .msg-wrapper { display: flex; align-items: flex-start; max-width: 85%; gap: 12px; }
        .msg-wrapper.user-wrapper { align-self: flex-end; flex-direction: row-reverse; }

        .msg { padding: 15px 20px; border-radius: 12px; font-size: 1rem; line-height: 1.5; white-space: pre-wrap; }
        .bot { background: #262626; color: #f0f0f0; border-left: 4px solid var(--primary); }
        .user { background: var(--primary); color: #000; font-weight: 700; }

        /* INPUT */
        .input-area { padding: 15px; background: #000; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .btn-action { background: var(--primary); color: #000; border: none; padding: 0 20px; border-radius: 5px; cursor: pointer; font-weight: 800; }
    </style>
</head>
<body>

    <div class="header">
        <h1><div class="shuttle-icon"></div> Airi Sense · ProvenFray</h1>
        <a href="#" class="btn-torneos">TORNEOS</a>
    </div>

    <div id="chat-container">
        <div id="chat-box">
            <div class="msg-wrapper">
                <div class="shuttle-icon" style="width:20px; height:20px;"></div>
                <div class="msg bot">¡Hola! Soy tu zona de entrenamiento inteligente. 🏸

Estoy lista para analizar tu técnica, táctica y tus fotos.

¿En qué quieres trabajar hoy?</div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="updateFileStatus()">
            <button class="btn-action" style="background:#333; color:white;" onclick="document.getElementById('imageInput').click()">📎</button>
            <input type="text" id="userInput" placeholder="Escribe aquí...">
            <button class="btn-action" onclick="enviar()">ENVIAR</button>
        </div>
    </div>

    <script>
        function updateFileStatus() {
            const input = document.getElementById('imageInput');
            document.querySelector('.btn-file').innerHTML = input.files.length > 0 ? '✔' : '📎';
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const fileInput = document.getElementById('imageInput');
            const box = document.getElementById('chat-box');
            if(!input.value.trim() && fileInput.files.length === 0) return;

            const text = input.value;
            box.innerHTML += `<div class="msg-wrapper user-wrapper"><div class="msg user">${text}</div></div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await res.json();
                box.innerHTML += `
                    <div class="msg-wrapper">
                        <div class="shuttle-icon" style="width:20px; height:20px; margin-top:10px;"></div>
                        <div class="msg bot">${data.text}</div>
                    </div>`;
            } catch (e) {
                box.innerHTML += `<div class="msg bot" style="color:red;">Error de conexión.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
